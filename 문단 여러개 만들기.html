<h2>강동혁이 밥오인 충격적인 이유</h2>
<p>
오늘은 내가 왜 강동혁을 밥오라고 부르는지 알려줄 것이다.
<br>
당신은 내가 왜 강동혁을 밥오라고 부르는지 아는가?
<br>
그래, 당신은 모르겠지.
</p>
<hr>
<p>
사실 이 질문에 답은 없다.
<br>왜 답이 없냐고?
<br>그건 바로, 내가 강동혁을 밥오라고 부르는
<br>이유가 없기 때문이다!!
</p>
<hr>
<p>
하하, 정말 충격적이지 않은가?
</p>
